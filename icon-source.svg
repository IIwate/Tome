<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#252539"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0E0CC"/>
      <stop offset="100%" stop-color="#D8C4A8"/>
    </linearGradient>
    <linearGradient id="spine-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8C6B2D"/>
      <stop offset="100%" stop-color="#B8923E"/>
    </linearGradient>
  </defs>

  <!-- 深色背景 -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <g transform="translate(512, 500)">
    <!-- 投影 -->
    <rect x="-210" y="-250" width="420" height="520" rx="12" fill="rgba(0,0,0,0.2)" transform="translate(6, 8)"/>

    <!-- 书脊 -->
    <rect x="-210" y="-250" width="56" height="520" rx="8" fill="url(#spine-grad)"/>
    <!-- 书脊装饰线 -->
    <rect x="-210" y="-200" width="56" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>
    <rect x="-210" y="220" width="56" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>

    <!-- 页面边缘 -->
    <rect x="-154" y="-240" width="24" height="500" rx="2" fill="#FFF8EE"/>
    <line x1="-148" y1="-225" x2="-148" y2="245" stroke="#E8DDD0" stroke-width="1"/>
    <line x1="-142" y1="-225" x2="-142" y2="245" stroke="#E8DDD0" stroke-width="1"/>
    <line x1="-136" y1="-225" x2="-136" y2="245" stroke="#E8DDD0" stroke-width="1"/>

    <!-- 封面 -->
    <rect x="-130" y="-250" width="340" height="520" rx="8" fill="url(#cover)"/>

    <!-- 封面装饰线（书名暗示） -->
    <rect x="-60" y="-50" width="200" height="5" rx="2.5" fill="#B89A6E" opacity="0.45"/>
    <rect x="-60" y="-30" width="150" height="5" rx="2.5" fill="#B89A6E" opacity="0.3"/>
    <rect x="-60" y="-10" width="100" height="5" rx="2.5" fill="#B89A6E" opacity="0.2"/>
  </g>
</svg>
